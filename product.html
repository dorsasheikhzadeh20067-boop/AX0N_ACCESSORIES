<!DOCTYPE html>

<head>

</head>

<body>

<div class="product-page glass">

    <img src="8f.jpg" alt="">

    <div class="product-info">

        <h1>مینی آلبوم ستاره ای  </h1>

        <p>
           ‹خاص ترین آلبومی که میتونی داشته باشی›
           <br>
                  ‹جنسش از چرم براقه  ›

                   ‹رنگبندی:مشکی، سیلور›

        <h2>460,000 تومان</h2>

            <button onclick="decrease()">-</button>
