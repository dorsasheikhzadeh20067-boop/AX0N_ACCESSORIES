<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جزئیات محصول</title>
<link rel="stylesheet" href="product.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="product-page glass">
<div class="dots">
    <span></span>
    <span></span>
</div>
   <div class="product-slider">

    <div class="slides">

        <img src="13f.jpg" alt="">

        <img src="13ff.jpg" alt="">

    </div>

</div>
    <div class="product-info">

        <h1>  لیپ گلاس با آینه قلبی </h1>

        <p>
   ‹ قلبش لاکته میتونین‌توش هرچیزی نگهداری کنین   ›
   <br>
‹جز لیپ گلاس هرچیزی که مناسب باشه هم میتونین توش قرار بدین ›
<br>
‹  ادایی ترین اکسسوری دنیا›


        </p>

        <h2> قیمت هر پک(4 تاش) : 880,000 تومان</h2>

        <div class="quantity-box">

            <button onclick="decrease()">-</button>

            <input type="number"
                   id="quantity"
                   value="1"
                   min="1">

            <button onclick="increase()">+</button>

        </div>

        <button class="add-cart">
            افزودن به سبد خرید
        </button>

    </div>

</div>

<script src="product.js"></script>

</html>
